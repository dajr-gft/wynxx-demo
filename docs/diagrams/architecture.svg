<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 1000" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCFDFE"/>
      <stop offset="100%" stop-color="#F2F5F8"/>
    </linearGradient>
    <linearGradient id="layer1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4285F4"/>
      <stop offset="100%" stop-color="#3367D6"/>
    </linearGradient>
    <linearGradient id="layer2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34A853"/>
      <stop offset="100%" stop-color="#1E8E3E"/>
    </linearGradient>
    <linearGradient id="layer3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBBC04"/>
      <stop offset="100%" stop-color="#F29900"/>
    </linearGradient>
    <linearGradient id="layer4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EA4335"/>
      <stop offset="100%" stop-color="#C5221F"/>
    </linearGradient>
    <linearGradient id="layer5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5F6368"/>
      <stop offset="100%" stop-color="#3C4043"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5F6368"/>
    </marker>
  </defs>

  <rect width="1280" height="1000" fill="url(#bg)"/>

  <!-- Title -->
  <text x="640" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#1A1A1A">Enterprise SDLC agent stack on Google Cloud (post Next '26)</text>
  <text x="640" y="64" text-anchor="middle" font-size="14" fill="#5F6368">Two paths from a Wynxx-style SDLC platform to Gemini CLI, Code Assist, ADK, and Gemini Enterprise — through MCP</text>

  <!-- Layer 1: Surfaces -->
  <rect x="60" y="100" width="1160" height="120" rx="14" fill="#FFFFFF" stroke="#DADCE0" stroke-width="1"/>
  <rect x="60" y="100" width="6" height="120" rx="3" fill="url(#layer1)"/>
  <text x="84" y="128" font-size="13" font-weight="700" fill="#3367D6" letter-spacing="0.5">1 · DEVELOPER &amp; AGENT SURFACES</text>

  <g font-size="13" fill="#1A1A1A">
    <rect x="100" y="148" width="240" height="56" rx="8" fill="#E8F0FE" stroke="#4285F4" stroke-width="1"/>
    <text x="220" y="172" text-anchor="middle" font-weight="700">Gemini CLI</text>
    <text x="220" y="190" text-anchor="middle" font-size="11" fill="#5F6368">terminal · platform engineering</text>

    <rect x="370" y="148" width="240" height="56" rx="8" fill="#E8F0FE" stroke="#4285F4" stroke-width="1"/>
    <text x="490" y="172" text-anchor="middle" font-weight="700">Gemini Code Assist</text>
    <text x="490" y="190" text-anchor="middle" font-size="11" fill="#5F6368">IDE · Agent Mode</text>

    <rect x="640" y="148" width="240" height="56" rx="8" fill="#E8F0FE" stroke="#4285F4" stroke-width="1"/>
    <text x="760" y="172" text-anchor="middle" font-weight="700">ADK 2.0 agents</text>
    <text x="760" y="190" text-anchor="middle" font-size="11" fill="#5F6368">graph workflows · A2A</text>

    <rect x="910" y="148" width="270" height="56" rx="8" fill="#E8F0FE" stroke="#4285F4" stroke-width="1"/>
    <text x="1045" y="172" text-anchor="middle" font-weight="700">Gemini Enterprise app</text>
    <text x="1045" y="190" text-anchor="middle" font-size="11" fill="#5F6368">business users · Agent Designer</text>
  </g>

  <!-- Arrow down -->
  <line x1="640" y1="230" x2="640" y2="265" stroke="#5F6368" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 2: Agent Gateway -->
  <rect x="60" y="270" width="1160" height="130" rx="14" fill="#FFFFFF" stroke="#DADCE0" stroke-width="1"/>
  <rect x="60" y="270" width="6" height="130" rx="3" fill="url(#layer2)"/>
  <text x="84" y="298" font-size="13" font-weight="700" fill="#1E8E3E" letter-spacing="0.5">2 · GOVERNANCE PLANE · Agent Gateway (Next '26)</text>

  <g font-size="12" fill="#1A1A1A">
    <rect x="100" y="318" width="200" height="68" rx="8" fill="#E6F4EA" stroke="#34A853" stroke-width="1"/>
    <text x="200" y="342" text-anchor="middle" font-weight="700">Agent Identity</text>
    <text x="200" y="360" text-anchor="middle" font-size="11" fill="#5F6368">mTLS · DPoP · trackable</text>
    <text x="200" y="376" text-anchor="middle" font-size="11" fill="#5F6368">persona per agent</text>

    <rect x="320" y="318" width="200" height="68" rx="8" fill="#E6F4EA" stroke="#34A853" stroke-width="1"/>
    <text x="420" y="342" text-anchor="middle" font-weight="700">IAM · IAP</text>
    <text x="420" y="360" text-anchor="middle" font-size="11" fill="#5F6368">Deny policies</text>
    <text x="420" y="376" text-anchor="middle" font-size="11" fill="#5F6368">least-privilege at runtime</text>

    <rect x="540" y="318" width="200" height="68" rx="8" fill="#E6F4EA" stroke="#34A853" stroke-width="1"/>
    <text x="640" y="342" text-anchor="middle" font-weight="700">Model Armor</text>
    <text x="640" y="360" text-anchor="middle" font-size="11" fill="#5F6368">prompt injection</text>
    <text x="640" y="376" text-anchor="middle" font-size="11" fill="#5F6368">tool poisoning · DLP</text>

    <rect x="760" y="318" width="200" height="68" rx="8" fill="#E6F4EA" stroke="#34A853" stroke-width="1"/>
    <text x="860" y="342" text-anchor="middle" font-weight="700">Agent Registry</text>
    <text x="860" y="360" text-anchor="middle" font-size="11" fill="#5F6368">approved agents</text>
    <text x="860" y="376" text-anchor="middle" font-size="11" fill="#5F6368">tools · MCP servers</text>

    <rect x="980" y="318" width="200" height="68" rx="8" fill="#E6F4EA" stroke="#34A853" stroke-width="1"/>
    <text x="1080" y="342" text-anchor="middle" font-weight="700">OTel + Audit Logs</text>
    <text x="1080" y="360" text-anchor="middle" font-size="11" fill="#5F6368">traceability</text>
    <text x="1080" y="376" text-anchor="middle" font-size="11" fill="#5F6368">forensic-grade observability</text>
  </g>

  <!-- Arrows down to both paths -->
  <line x1="380" y1="410" x2="380" y2="450" stroke="#5F6368" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="900" y1="410" x2="900" y2="450" stroke="#5F6368" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 3: Two MCP paths -->
  <text x="640" y="445" text-anchor="middle" font-size="13" font-weight="700" fill="#5F6368">TWO PATHS TO MCP-EXPOSE WYNXX</text>

  <!-- Path A -->
  <rect x="60" y="460" width="580" height="160" rx="14" fill="#FFFFFF" stroke="#DADCE0" stroke-width="1"/>
  <rect x="60" y="460" width="6" height="160" rx="3" fill="url(#layer3)"/>
  <text x="84" y="488" font-size="13" font-weight="700" fill="#F29900" letter-spacing="0.5">3A · CUSTOM MCP SERVER on Cloud Run</text>

  <g font-size="12" fill="#1A1A1A">
    <rect x="100" y="510" width="240" height="90" rx="8" fill="#FEF7E0" stroke="#FBBC04" stroke-width="1"/>
    <text x="220" y="534" text-anchor="middle" font-weight="700">Python · FastMCP</text>
    <text x="220" y="554" text-anchor="middle" font-size="11" fill="#5F6368">streamable HTTP</text>
    <text x="220" y="572" text-anchor="middle" font-size="11" fill="#5F6368">analyze_repository</text>
    <text x="220" y="588" text-anchor="middle" font-size="11" fill="#5F6368">generate_tests · review_code</text>

    <rect x="360" y="510" width="260" height="90" rx="8" fill="#F8F9FA" stroke="#80868B" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="490" y="534" text-anchor="middle" font-weight="700">Best when</text>
    <text x="490" y="554" text-anchor="middle" font-size="11" fill="#5F6368">you need custom logic,</text>
    <text x="490" y="572" text-anchor="middle" font-size="11" fill="#5F6368">tool-call orchestration,</text>
    <text x="490" y="588" text-anchor="middle" font-size="11" fill="#5F6368">or non-REST integrations</text>
  </g>

  <!-- Path B -->
  <rect x="660" y="460" width="560" height="160" rx="14" fill="#FFFFFF" stroke="#DADCE0" stroke-width="1"/>
  <rect x="660" y="460" width="6" height="160" rx="3" fill="url(#layer3)"/>
  <text x="684" y="488" font-size="13" font-weight="700" fill="#F29900" letter-spacing="0.5">3B · APIGEE AS MCP BRIDGE (Next '26)</text>

  <g font-size="12" fill="#1A1A1A">
    <rect x="700" y="510" width="240" height="90" rx="8" fill="#FEF7E0" stroke="#FBBC04" stroke-width="1"/>
    <text x="820" y="534" text-anchor="middle" font-weight="700">Apigee MCP proxy</text>
    <text x="820" y="554" text-anchor="middle" font-size="11" fill="#5F6368">/mcp basepath</text>
    <text x="820" y="572" text-anchor="middle" font-size="11" fill="#5F6368">OpenAPI → tools/list</text>
    <text x="820" y="588" text-anchor="middle" font-size="11" fill="#5F6368">auto-registered in API hub</text>

    <rect x="960" y="510" width="240" height="90" rx="8" fill="#F8F9FA" stroke="#80868B" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="1080" y="534" text-anchor="middle" font-weight="700">Best when</text>
    <text x="1080" y="554" text-anchor="middle" font-size="11" fill="#5F6368">Wynxx already exposes REST,</text>
    <text x="1080" y="572" text-anchor="middle" font-size="11" fill="#5F6368">no new code to maintain,</text>
    <text x="1080" y="588" text-anchor="middle" font-size="11" fill="#5F6368">30+ Apigee policies for free</text>
  </g>

  <!-- Arrows down -->
  <line x1="350" y1="625" x2="350" y2="665" stroke="#5F6368" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="940" y1="625" x2="940" y2="665" stroke="#5F6368" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 4: SDLC engine -->
  <rect x="60" y="675" width="1160" height="120" rx="14" fill="#FFFFFF" stroke="#DADCE0" stroke-width="1"/>
  <rect x="60" y="675" width="6" height="120" rx="3" fill="url(#layer4)"/>
  <text x="84" y="703" font-size="13" font-weight="700" fill="#C5221F" letter-spacing="0.5">4 · ENTERPRISE SDLC ENGINE (Wynxx-style platform)</text>

  <g font-size="12" fill="#1A1A1A">
    <rect x="100" y="722" width="180" height="56" rx="8" fill="#FCE8E6" stroke="#EA4335" stroke-width="1"/>
    <text x="190" y="746" text-anchor="middle" font-weight="700">Repository analysis</text>
    <text x="190" y="764" text-anchor="middle" font-size="11" fill="#5F6368">+ architecture review</text>

    <rect x="295" y="722" width="180" height="56" rx="8" fill="#FCE8E6" stroke="#EA4335" stroke-width="1"/>
    <text x="385" y="746" text-anchor="middle" font-weight="700">Test generation</text>
    <text x="385" y="764" text-anchor="middle" font-size="11" fill="#5F6368">unit · integration · regression</text>

    <rect x="490" y="722" width="180" height="56" rx="8" fill="#FCE8E6" stroke="#EA4335" stroke-width="1"/>
    <text x="580" y="746" text-anchor="middle" font-weight="700">Documentation</text>
    <text x="580" y="764" text-anchor="middle" font-size="11" fill="#5F6368">architecture · API · audit</text>

    <rect x="685" y="722" width="180" height="56" rx="8" fill="#FCE8E6" stroke="#EA4335" stroke-width="1"/>
    <text x="775" y="746" text-anchor="middle" font-weight="700">Modernization</text>
    <text x="775" y="764" text-anchor="middle" font-size="11" fill="#5F6368">legacy → cloud-native</text>

    <rect x="880" y="722" width="300" height="56" rx="8" fill="#FCE8E6" stroke="#EA4335" stroke-width="1"/>
    <text x="1030" y="746" text-anchor="middle" font-weight="700">Code review · SAST remediation</text>
    <text x="1030" y="764" text-anchor="middle" font-size="11" fill="#5F6368">SonarQube · Snyk integration</text>
  </g>

  <!-- Arrow down -->
  <line x1="640" y1="805" x2="640" y2="845" stroke="#5F6368" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 5: GCP foundation -->
  <rect x="60" y="855" width="1160" height="120" rx="14" fill="#FFFFFF" stroke="#DADCE0" stroke-width="1"/>
  <rect x="60" y="855" width="6" height="120" rx="3" fill="url(#layer5)"/>
  <text x="84" y="883" font-size="13" font-weight="700" fill="#3C4043" letter-spacing="0.5">5 · GOOGLE CLOUD FOUNDATION</text>

  <g font-size="12" fill="#1A1A1A">
    <rect x="100" y="902" width="160" height="56" rx="8" fill="#F1F3F4" stroke="#80868B" stroke-width="1"/>
    <text x="180" y="926" text-anchor="middle" font-weight="700">Cloud Run · GKE</text>
    <text x="180" y="944" text-anchor="middle" font-size="11" fill="#5F6368">runtime · Agent Runtime</text>

    <rect x="275" y="902" width="160" height="56" rx="8" fill="#F1F3F4" stroke="#80868B" stroke-width="1"/>
    <text x="355" y="926" text-anchor="middle" font-weight="700">Vertex AI Model Garden</text>
    <text x="355" y="944" text-anchor="middle" font-size="11" fill="#5F6368">Gemini 3 · 200+ models</text>

    <rect x="450" y="902" width="160" height="56" rx="8" fill="#F1F3F4" stroke="#80868B" stroke-width="1"/>
    <text x="530" y="926" text-anchor="middle" font-weight="700">VPC-SC · Cloud KMS</text>
    <text x="530" y="944" text-anchor="middle" font-size="11" fill="#5F6368">CMEK per tenant</text>

    <rect x="625" y="902" width="160" height="56" rx="8" fill="#F1F3F4" stroke="#80868B" stroke-width="1"/>
    <text x="705" y="926" text-anchor="middle" font-weight="700">Secret Manager</text>
    <text x="705" y="944" text-anchor="middle" font-size="11" fill="#5F6368">tokens · credentials</text>

    <rect x="800" y="902" width="160" height="56" rx="8" fill="#F1F3F4" stroke="#80868B" stroke-width="1"/>
    <text x="880" y="926" text-anchor="middle" font-weight="700">BigQuery · Looker</text>
    <text x="880" y="944" text-anchor="middle" font-size="11" fill="#5F6368">agent analytics</text>

    <rect x="975" y="902" width="205" height="56" rx="8" fill="#F1F3F4" stroke="#80868B" stroke-width="1"/>
    <text x="1077" y="926" text-anchor="middle" font-weight="700">Security Command Center</text>
    <text x="1077" y="944" text-anchor="middle" font-size="11" fill="#5F6368">posture · agent threat detection</text>
  </g>
</svg>
